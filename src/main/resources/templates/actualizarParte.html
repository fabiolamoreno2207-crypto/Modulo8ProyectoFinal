<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Editar parte</title>
</head>
<body>
<h1>Actualizar parte</h1>

<form th:action="@{/web/parte/actualizar}"
      method="POST"
      th:object="${parte}">
    <!-- Campo oculto para el id -->
    <input type="hidden" th:field="*{id_parte}">

    <div>
        <label for="sku">SKU:</label>
        <input type="text" id="sku" th:field="*{sku}">
    </div>
    <div>
        <label for="descripcion">Descripción:</label>
        <input type="text" id="descripcion" th:field="*{descripcion}">
    </div>
    <div>
        <label for="ubicacion">Ubicación:</label>
        <input type="text" id="ubicacion" th:field="*{ubicacion}">
    </div>
    <div>
        <label for="stock">Stock:</label>
        <input type="number" id="stock" th:field="*{stock}">
    </div>
    <div>
        <button type="submit">Guardar cambios</button>
    </div>
</form>

</body>
</html>
