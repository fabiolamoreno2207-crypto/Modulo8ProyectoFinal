<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Alta de Parte</title>
</head>
<body>
<h1>Alta de parte</h1>

<form method="POST"
      th:action="@{/web/parte/nueva/parte}"
      th:object="${parte}">
    <p>
        <label for="sku">SKU</label>
        <input type="text" id="sku" th:field="*{sku}">
    </p>
    <p>
        <label for="descripcion">Descripción</label>
        <input type="text" id="descripcion" th:field="*{descripcion}">
    </p>
    <p>
        <label for="ubicacion">Ubicación</label>
        <input type="text" id="ubicacion" th:field="*{ubicacion}">
    </p>
    <p>
        <label for="stock">Stock</label>
        <input type="number" id="stock" th:field="*{stock}">
    </p>

    <button type="submit">Guardar</button>
</form>

</body>
</html>
